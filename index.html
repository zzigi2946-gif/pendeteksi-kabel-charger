<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Kabel Charger</title>

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>

        body{
            background:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        .container{
            position:relative;
            width:640px;
            height:480px;
            margin:auto;
            border:2px solid #444;
            border-radius:10px;
            overflow:hidden;
        }

        video{
            position:absolute;
            width:640px;
            height:480px;
            top:0;
            left:0;
            object-fit:cover;
        }

        canvas{
            position:absolute;
            width:640px;
            height:480px;
            top:0;
            left:0;
        }

        #processor{
            display:none;
        }

        button{
            margin-top:20px;
            padding:12px 20px;
            font-size:18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#ff9800;
            color:white;
            font-weight:bold;
        }

        #status{
            margin-top:15px;
            padding:10px;
            background:#1e1e1e;
            border-radius:8px;
        }

    </style>
</head>
<body>

    <h1>AI Deteksi Kabel Charger</h1>

    <div class="container">

        <video
            id="webcam"
            autoplay
            playsinline
        ></video>

        <canvas id="overlay"></canvas>

        <canvas
            id="processor"
            width="640"
            height="480"
        ></canvas>

    </div>

    <button id="btn-init">
        AKTIFKAN KAMERA
    </button>

    <div id="status">
        Menunggu...
    </div>

    <script src="app.js"></script>

</body>
</html>
